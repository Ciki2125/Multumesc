<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Invitație</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            max-width: 800px;
            margin-bottom: 40px;
        }

        #buttons {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #da {
            background-color: #2ecc71;
            color: white;
        }

        #nu {
            background-color: #e74c3c;
            color: white;
        }

        #warning {
            position: absolute;
            bottom: 20px;
            font-weight: bold;
        }

        #result {
            font-size: 26px;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1 id="title">
       De ziua mea mi ar face o deosebita placere să mergem la film împreună🤗
        <br>Apasă pentru a continua.
    </h1>

    <div id="buttons">
        <button id="da">DA</button>
        <button id="nu">NU</button>
    </div>

    <div id="result"></div>

    <div id="warning">ATENȚIE RĂSPUNSUL ESTE CONTRAINTUITIV!!!</div>

    <script>
        let nuClicks = 0;
        let stage = 1;

        const daBtn = document.getElementById("da");
        const nuBtn = document.getElementById("nu");
        const result = document.getElementById("result");
        const title = document.getElementById("title");
        const buttonsDiv = document.getElementById("buttons");

        daBtn.onclick = () => {
            if (stage === 1) {
                showBartini();
            } else if (stage === 2) {
                resizeButtons(-1);
            }
        };

        nuBtn.onclick = () => {
            if (stage === 1) {
                nuClicks++;
                resizeButtons(1);

                if (nuClicks === 3) {
                    showTogetherQuestion();
                }
            } else if (stage === 2) {
                showFinalInvite();
            }
        };

        function resizeButtons(direction) {
            const daSize = daBtn.offsetWidth;
            const nuSize = nuBtn.offsetWidth;

            if (direction === 1) {
                daBtn.style.transform = "scale(1.2)";
                nuBtn.style.transform = "scale(0.8)";
            } else {
                daBtn.style.transform = "scale(0.8)";
                nuBtn.style.transform = "scale(1.2)";
            }
        }

        function showBartini() {
            title.style.display = "none";
            buttonsDiv.style.display = "none";
            result.innerText = "Incercati cu NU";
        }

        function showTogetherQuestion() {
            stage = 2;
            nuClicks = 0;

            title.innerText = "SIGUR?";
            daBtn.style.transform = "scale(1)";
            nuBtn.style.transform = "scale(1)";
        }

        function showFinalInvite() {
            title.style.display = "none";
            buttonsDiv.style.display = "none";
            result.innerText =
                "MICHAEL 🤗🤗🤗";
        }
    </script>

</body>
</html>
